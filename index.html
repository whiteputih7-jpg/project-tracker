<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --ink:#16232F;
    --blue-deep:#1E3A5F;
    --blue-line:#B9CBDC;
    --blue-tint:#EEF3F8;
    --paper:#FCFDFE;
    --red:#D6431F;
    --red-tint:#FCE7E1;
    --green:#3E7A5C;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--blue-line) 1px, transparent 1px) 0 0/40px 40px,
      linear-gradient(90deg, var(--blue-line) 1px, transparent 1px) 0 0/40px 40px,
      var(--paper);
    background-attachment:fixed;
    min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  header{
    border:2px solid var(--blue-deep);
    background:var(--white);
    margin:24px;
    display:flex;
    flex-wrap:wrap;
    align-items:stretch;
  }
  header .title-main{
    flex:1;
    padding:18px 24px;
    border-right:2px solid var(--blue-deep);
    min-width:220px;
  }
  header .title-main h1{
    margin:0;
    font-size:22px;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  header .title-main p{
    margin:6px 0 0;
    font-size:12px;
    color:#5A6B7A;
    font-family:'IBM Plex Mono',monospace;
  }
  header .stat{
    padding:10px 20px;
    border-right:1px solid var(--blue-line);
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-width:110px;
  }
  header .stat:last-child{border-right:none;}
  header .stat .n{font-size:24px;font-weight:600;}
  header .stat .l{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#5A6B7A;font-family:'IBM Plex Mono',monospace;}
  header .stat.urgent .n{color:var(--red);}

  .toolbar{
    margin:0 24px 20px;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  button{
    font-family:'Inter',sans-serif;
    cursor:pointer;
    border:1.5px solid var(--blue-deep);
    background:var(--white);
    color:var(--blue-deep);
    padding:8px 14px;
    font-size:13px;
    font-weight:600;
    border-radius:2px;
    transition:background .15s, color .15s;
  }
  button:hover{background:var(--blue-deep);color:var(--white);}
  button.primary{background:var(--blue-deep);color:var(--white);}
  button.primary:hover{background:var(--ink);}
  button.ghost{border-color:var(--blue-line);color:#5A6B7A;}
  button.ghost:hover{background:var(--blue-tint);color:var(--ink);}
  .sync-note{font-size:11px;color:#8A97A3;font-family:'IBM Plex Mono',monospace;margin-left:auto;}

  #banner{margin:0 24px 16px;padding:10px 14px;font-size:13px;border-radius:2px;display:none;}
  #banner.error{display:block;background:var(--red-tint);border:1px solid var(--red);color:var(--red);}
  #banner.info{display:block;background:var(--blue-tint);border:1px solid var(--blue-line);color:var(--blue-deep);}

  #board{
    margin:0 24px 40px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
  }
  .card{
    background:var(--white);
    border:1.5px solid var(--blue-deep);
    position:relative;
    padding-bottom:6px;
  }
  .card::before, .card::after{
    content:'';
    position:absolute;
    width:8px;height:8px;
    border:1.5px solid var(--blue-deep);
    top:-1.5px;
  }
  .card::before{left:-1.5px;border-right:none;border-bottom:none;}
  .card::after{right:-1.5px;border-left:none;border-bottom:none;}
  .card.has-urgent{border-color:var(--red);}
  .card.has-urgent::before, .card.has-urgent::after{border-color:var(--red);}

  .card-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    border-bottom:1.5px solid var(--blue-deep);
  }
  .card.has-urgent .card-head{border-bottom-color:var(--red);}
  .card-head h2{
    margin:0;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.03em;
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
  }
  .card-head .del{
    font-size:11px;color:#B0BAC3;cursor:pointer;border:none;background:none;padding:2px 4px;
  }
  .card-head .del:hover{color:var(--red);}

  .task-list{list-style:none;margin:0;padding:8px 0;}
  .task-row{
    display:flex;
    align-items:flex-start;
    gap:8px;
    padding:7px 14px;
    font-size:13px;
    line-height:1.4;
  }
  .task-row.urgent{background:var(--red-tint);border-left:3px solid var(--red);padding-left:11px;}
  .task-row input[type=checkbox]{
    margin-top:2px;
    accent-color:var(--blue-deep);
    width:15px;height:15px;
    flex-shrink:0;
  }
  .task-row .txt{flex:1;}
  .task-row .meta{font-size:10px;color:#8A97A3;font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .flag-btn{
    border:none;background:none;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;flex-shrink:0;
  }
  .task-row.urgent .flag-btn{color:var(--red);}
  .task-row:not(.urgent) .flag-btn{color:#C7D0D8;}

  .empty-msg{padding:14px;font-size:12px;color:#8A97A3;font-family:'IBM Plex Mono',monospace;}

  .add-task-wrap{padding:10px 14px 4px;border-top:1px dashed var(--blue-line);}
  .add-task-row{
    display:flex;gap:6px;align-items:center;
  }
  .add-task-row input[type=text]{
    flex:1;border:1px solid var(--blue-line);padding:6px 8px;font-size:13px;font-family:'Inter',sans-serif;border-radius:2px;min-width:0;
  }
  .add-task-row input[type=text]:focus{outline:2px solid var(--blue-deep);outline-offset:-1px;}
  .add-task-row .urgent-toggle{
    border:1px solid var(--blue-line);background:var(--white);color:#8A97A3;font-size:16px;padding:0 8px;border-radius:2px;cursor:pointer;flex-shrink:0;
  }
  .add-task-row .urgent-toggle.on{background:var(--red);color:var(--white);border-color:var(--red);}
  .add-task-row button.add-submit{padding:6px 10px;font-size:13px;flex-shrink:0;}
  .add-task-row .img-upload-btn{border:1px solid var(--blue-line);background:var(--white);color:var(--blue-deep);font-size:14px;padding:0 8px;border-radius:2px;cursor:pointer;flex-shrink:0;}
  .add-task-row .img-upload-btn:hover{background:var(--blue-tint);}
  .add-task-row input[type=file]{display:none;}
  .img-preview-wrap{margin-top:8px;display:none;gap:8px;flex-wrap:wrap;}
  .img-preview-thumb-wrap{position:relative;display:inline-block;max-width:90px;}
  .img-preview-thumb-wrap .img-preview{max-width:90px;max-height:70px;width:auto;height:auto;border:1px solid var(--blue-line);border-radius:2px;display:block;object-fit:cover;}
  .img-preview-thumb-wrap .img-remove-btn{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;border:1px solid var(--blue-line);background:var(--white);color:var(--red);font-size:10px;line-height:1;padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .img-preview-thumb-wrap .img-remove-btn:hover{background:var(--red-tint);}
  .task-images{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .task-img{max-width:100%;border-radius:2px;border:1px solid var(--blue-tint);}
  .task-caption{font-size:12px;color:#5A6B7A;margin-top:4px;font-style:italic;}
  .task-img{cursor:pointer;transition:opacity 0.15s;}
  .task-img:hover{opacity:0.85;}
  .img-modal{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
    z-index:1000;align-items:center;justify-content:center;padding:20px;
    cursor:zoom-out;
  }
  .img-modal.show{display:flex;}
  .img-modal img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px;cursor:default;}
  .img-modal .img-modal-close{
    position:absolute;top:16px;right:16px;background:rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;
    width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;
    align-items:center;justify-content:center;transition:background 0.15s;
  }
  .img-modal .img-modal-close:hover{background:rgba(255,255,255,0.2);}

  #history-wrap{margin:0 24px 40px;}
  #history-list{
    background:var(--white);border:1.5px solid var(--blue-line);
    max-height:260px;overflow-y:auto;
  }
  .hist-row{
    display:flex;justify-content:space-between;gap:10px;
    padding:8px 14px;font-size:12.5px;border-bottom:1px solid var(--blue-tint);
  }
  .hist-row .proj{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green);text-transform:uppercase;}
  .hist-row .date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8A97A3;white-space:nowrap;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(22,35,47,0.4);
    display:none;align-items:center;justify-content:center;z-index:50;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--white);border:2px solid var(--blue-deep);padding:24px;width:320px;
  }
  .modal h3{margin:0 0 14px;font-size:15px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
  .modal input[type=text], .modal textarea{
    width:100%;padding:8px;border:1px solid var(--blue-line);font-family:'Inter',sans-serif;font-size:14px;margin-bottom:12px;border-radius:2px;
  }
  .modal .row{display:flex;gap:8px;justify-content:flex-end;}
  .modal label.small{font-size:11px;color:#5A6B7A;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;display:block;margin-bottom:4px;}

  footer{
    text-align:center;font-size:11px;color:#A2ADB6;font-family:'IBM Plex Mono',monospace;padding:20px;
  }

  @media (max-width:600px){
    header .title-main{border-right:none;border-bottom:2px solid var(--blue-deep);}
    #board{grid-template-columns:1fr;}
  }

  /* ---- Whiteboard ---- */
  .wb-overlay{
    position:fixed;inset:0;z-index:999;
    background:rgba(22,35,47,0.5);
    display:none;align-items:center;justify-content:center;
    padding:16px;
  }
  .wb-overlay.show{display:flex;}
  .wb-wrap{
    background:var(--white);border:2px solid var(--blue-deep);
    width:92vw;max-width:1100px;height:90vh;max-height:800px;
    display:flex;flex-direction:column;
  }
  .wb-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;border-bottom:1px solid var(--blue-line);
  }
  .wb-title{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;text-transform:uppercase;}
  .wb-close{
    background:none;border:none;font-size:18px;cursor:pointer;
    width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;
    color:var(--ink);
  }
  .wb-close:hover{background:var(--blue-tint);}
  .wb-toolbar{
    display:flex;align-items:center;gap:4px;padding:8px 12px;
    border-bottom:1px solid var(--blue-line);flex-wrap:wrap;
    background:var(--paper);
  }
  .wb-tool{
    padding:6px 10px;border:1px solid var(--blue-line);background:var(--white);
    border-radius:4px;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;
    min-width:32px;text-align:center;
  }
  .wb-tool:hover{background:var(--blue-tint);}
  .wb-tool.active{background:var(--blue-deep);color:#fff;border-color:var(--blue-deep);}
  .wb-sep{width:1px;height:24px;background:var(--blue-line);margin:0 4px;display:inline-block;}
  .wb-color{width:30px;height:30px;border:1px solid var(--blue-line);border-radius:4px;padding:0;cursor:pointer;}
  .wb-label{font-size:11px;color:#5A6B7A;font-family:'IBM Plex Mono',monospace;}
  .wb-range{width:80px;vertical-align:middle;}
  .wb-body{flex:1;position:relative;overflow:hidden;min-height:200px;}
  .wb-body canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;}
  .wb-dropzone{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;opacity:1;transition:opacity 0.3s;
    font-family:'IBM Plex Mono',monospace;color:#A2ADB6;font-size:14px;
  }
  .wb-dropzone.hidden{opacity:0;}
  .wb-footer{
    display:flex;align-items:center;gap:10px;padding:10px 16px;
    border-top:1px solid var(--blue-line);flex-wrap:wrap;
  }
  .wb-select,.wb-input{
    padding:7px 10px;border:1px solid var(--blue-line);border-radius:4px;
    font-family:'Inter',sans-serif;font-size:13px;background:var(--white);
  }
  .wb-select{min-width:140px;}
  .wb-input{flex:1;min-width:120px;}
  .wb-urgent{font-size:12px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
</style>
</head>
<body>

<header>
  <div class="title-main">
    <h1>Project Tracker</h1>
    <p id="synced-line">menyambungkan ke database...</p>
  </div>
  <div class="stat">
    <div class="n" id="stat-projects">0</div>
    <div class="l">Project</div>
  </div>
  <div class="stat">
    <div class="n" id="stat-tasks">0</div>
    <div class="l">Task Aktif</div>
  </div>
  <div class="stat urgent">
    <div class="n" id="stat-urgent">0</div>
    <div class="l">Urgent</div>
  </div>
</header>

<div class="toolbar">
  <button class="primary" onclick="openProjectModal()">+ Project Baru</button>
  <button class="ghost" onclick="openWhiteboard()">✏️ Whiteboard</button>
  <button class="ghost" onclick="toggleHistory()">Riwayat Selesai</button>
  <span class="sync-note" id="sync-note"></span>
</div>

<div id="banner"></div>

<div id="board"></div>

<div id="history-wrap" style="display:none;">
  <div id="history-list"></div>
</div>

<div class="wb-overlay" id="wb-overlay">
  <div class="wb-wrap">
    <div class="wb-header">
      <span class="wb-title">✏️ Whiteboard</span>
      <button class="wb-close" onclick="closeWhiteboard()">✕</button>
    </div>
    <div class="wb-toolbar">
      <button class="wb-tool active" data-tool="pencil" onclick="wbSetTool('pencil')">✏️</button>
      <button class="wb-tool" data-tool="line" onclick="wbSetTool('line')">╱</button>
      <button class="wb-tool" data-tool="rect" onclick="wbSetTool('rect')">▭</button>
      <button class="wb-tool" data-tool="circle" onclick="wbSetTool('circle')">○</button>
      <button class="wb-tool" data-tool="arrow" onclick="wbSetTool('arrow')">→</button>
      <button class="wb-tool" data-tool="text" onclick="wbSetTool('text')">T</button>
      <button class="wb-tool" data-tool="select" onclick="wbSetTool('select')">↖</button>
      <button class="wb-tool" data-tool="eraser" onclick="wbSetTool('eraser')">⌫</button>
      <span class="wb-sep"></span>
      <input type="color" class="wb-color" id="wb-color" value="#D6431F" onchange="wbColor=this.value;wbRedraw()">
      <label class="wb-label">Stroke</label>
      <input type="range" class="wb-range" id="wb-width" min="1" max="12" value="3" oninput="wbWidth=+this.value;wbRedraw()">
      <span class="wb-sep"></span>
      <button class="wb-tool" onclick="wbUndo()">↩ Undo</button>
      <button class="wb-tool" onclick="wbClearCanvas()">🗑 Hapus</button>
    </div>
    <div class="wb-body">
      <canvas id="wb-canvas"></canvas>
      <div class="wb-dropzone" id="wb-dropzone">
        <p>Paste <b>Ctrl+V</b> atau <b>tarik gambar</b> ke sini</p>
      </div>
    </div>
    <div class="wb-footer">
      <select id="wb-project" class="wb-select"><option value="">— Pilih Project —</option></select>
      <input type="text" id="wb-caption" class="wb-input" placeholder="Caption revisi (opsional)">
      <label class="wb-urgent"><input type="checkbox" id="wb-urgent"> Urgent</label>
      <button class="primary" onclick="wbAddToTask()">+ Add to Task</button>
    </div>
  </div>
</div>


<footer>disambungkan ke Supabase (realtime)</footer>

<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <h3>Project Baru</h3>
    <label class="small">Nama Project</label>
    <input type="text" id="new-project-name" placeholder="cth: Rumah Ricky">
    <div class="row">
      <button class="ghost" onclick="closeModal('project-modal')">Batal</button>
      <button class="primary" onclick="submitNewProject()">Simpan</button>
    </div>
  </div>
</div>

<div class="img-modal" id="img-modal" onclick="closeImgModal(event)">
  <button class="img-modal-close" onclick="closeImgModal()">✕</button>
  <img id="img-modal-img" src="" alt="perbesar gambar">
</div>

<script>
// ---- Supabase config (anon/publishable key is safe to expose; access is controlled by RLS policies) ----
const SUPABASE_URL = 'https://jvmuuxihmvtdchittwhq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LSd7KnvdVjxWr1FZKFSnyg_laZKWYiI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = { projects: [], tasks: [] };

function showBanner(msg, type){
  const b = document.getElementById('banner');
  b.textContent = msg;
  b.className = type;
}
function hideBanner(){ document.getElementById('banner').className = ''; }

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
function openProjectModal(){
  document.getElementById('new-project-name').value = '';
  openModal('project-modal');
}

function setSyncing(on){
  document.getElementById('sync-note').textContent = on ? 'menyimpan...' : ('tersimpan ' + new Date().toLocaleTimeString('id-ID'));
}

async function loadData(){
  document.getElementById('sync-note').textContent = 'memuat...';
  const [{ data: projects, error: pErr }, { data: tasks, error: tErr }] = await Promise.all([
    sb.from('projects').select('name').order('created_at'),
    sb.from('tasks').select('*').order('date_created')
  ]);
  if(pErr || tErr){
    showBanner('Gagal memuat data dari Supabase: ' + (pErr?.message || tErr?.message), 'error');
    return;
  }
  hideBanner();
  state.projects = projects.map(p => p.name);
  state.tasks = tasks.map(t => ({
    id: t.id,
    project: t.project_name,
    task: t.task,
    image_data: t.image_data || null,
    caption: t.caption || '',
    urgent: t.urgent,
    dateCreated: t.date_created,
    dateCompleted: t.date_completed,
    status: t.status
  }));
  document.getElementById('synced-line').textContent = 'tersambung ke Supabase';
  document.getElementById('sync-note').textContent = 'terakhir sync ' + new Date().toLocaleTimeString('id-ID');
  render();
}

function render(){
  const board = document.getElementById('board');
  board.innerHTML = '';

  const activeTasks = state.tasks.filter(t => t.status !== 'Selesai');
  const allProjectNames = Array.from(new Set([...state.projects, ...state.tasks.map(t=>t.project)]));

  document.getElementById('stat-projects').textContent = allProjectNames.length;
  document.getElementById('stat-tasks').textContent = activeTasks.length;
  document.getElementById('stat-urgent').textContent = activeTasks.filter(t=>t.urgent).length;

  if(allProjectNames.length === 0){
    board.innerHTML = '<div class="empty-msg">Belum ada project. Klik "+ Project Baru" untuk mulai.</div>';
  }

  allProjectNames.forEach(projectName => {
    const tasksForProject = activeTasks.filter(t => t.project === projectName)
      .sort((a,b)=> (b.urgent - a.urgent));
    const hasUrgent = tasksForProject.some(t=>t.urgent);

    const card = document.createElement('div');
    card.className = 'card' + (hasUrgent ? ' has-urgent' : '');

    const head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML = `<h2>${escapeHtml(projectName)}</h2><button class="del" title="Hapus project" onclick="removeProject('${escapeAttr(projectName)}')">✕</button>`;
    card.appendChild(head);

    const list = document.createElement('ul');
    list.className = 'task-list';
    if(tasksForProject.length === 0){
      list.innerHTML = '<div class="empty-msg">Belum ada task.</div>';
    }
    tasksForProject.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-row' + (t.urgent ? ' urgent' : '');
      let taskHtml = '';
      const imgs = getImageArray(t.image_data);
      if(imgs.length){
        taskHtml += '<div class="task-images">';
        imgs.forEach(src => { taskHtml += `<img src="${escapeAttr(src)}" class="task-img" alt="task image">`; });
        taskHtml += '</div>';
      }
      if(t.caption){
        taskHtml += `<div class="task-caption">${escapeHtml(t.caption)}</div>`;
      } else if(!imgs.length) {
        taskHtml += escapeHtml(t.task);
      }
      li.innerHTML = `
        <input type="checkbox" onchange="completeTask('${t.id}')">
        <div class="txt">${taskHtml}<div class="meta">dibuat ${formatDate(t.dateCreated)}</div></div>
        <button class="flag-btn" title="Tandai urgent" onclick="toggleUrgent('${t.id}', ${!t.urgent})">⚑</button>
      `;
      list.appendChild(li);
    });
    card.appendChild(list);

    const addWrap = document.createElement('div');
    addWrap.className = 'add-task-wrap';
    addWrap._pendingImages = [];
    addWrap.innerHTML = `
      <div class="add-task-row">
        <button class="urgent-toggle" data-urgent="0" onclick="toggleAddUrgent(this)">⚑</button>
        <input type="text" class="task-input" placeholder="Task baru... (Ctrl+V untuk beberapa gambar)" onpaste="handlePaste(event, this, this.closest('.add-task-wrap').querySelector('.img-preview-input'))" onkeydown="handleInputKey(event, '${escapeAttr(projectName)}', this, this.closest('.add-task-wrap').querySelector('.img-preview-input'))" style="flex:1;">
        <input type="file" class="img-preview-input" accept="image/*" multiple onchange="previewImage(this)" style="display:none;">
        <button class="img-upload-btn" onclick="this.previousElementSibling.click()">📷</button>
        <button class="add-submit primary" onclick="submitNewTask('${escapeAttr(projectName)}', this.closest('.add-task-wrap').querySelector('.task-input'), this.closest('.add-task-wrap').querySelector('.img-preview-input'))">+</button>
      </div>
      <div class="img-preview-wrap" style="display:none;"></div>
    `;
    card.appendChild(addWrap);

    board.appendChild(card);
  });

  renderHistory();
}

function toggleAddUrgent(btn){
  const on = btn.getAttribute('data-urgent') === '1';
  btn.setAttribute('data-urgent', on ? '0' : '1');
  btn.classList.toggle('on', !on);
}

function handleInputKey(event, projectName, inputEl, fileInputEl){
  if(event.key === 'Enter'){
    event.preventDefault();
    submitNewTask(projectName, inputEl, fileInputEl);
  }
}

// Handle paste event for images (Ctrl+V), supports multiple images
function handlePaste(event, inputEl, fileInputEl){
  const items = (event.clipboardData || event.originalEvent.clipboardData).items;
  let hasImage = false;
  for(let item of items){
    if(item.type.indexOf('image') !== -1){ hasImage = true; break; }
  }
  if(!hasImage) return; // allow default text paste
  event.preventDefault();
  const wrap = inputEl.closest('.add-task-wrap');
  for(let item of items){
    if(item.type.indexOf('image') !== -1){
      const blob = item.getAsFile();
      if(blob) addImageFromFile(wrap, blob);
    }
  }
}

async function submitNewProject(){
  const name = document.getElementById('new-project-name').value.trim();
  if(!name) return;
  closeModal('project-modal');
  if(state.projects.includes(name)){ showBanner('Project sudah ada', 'error'); return; }

  state.projects.push(name);
  render();
  setSyncing(true);
  const { error } = await sb.from('projects').insert({ name });
  if(error){ showBanner(error.message, 'error'); state.projects = state.projects.filter(p=>p!==name); render(); }
  setSyncing(false);
}

async function removeProject(name){
  if(!confirm('Hapus project "'+name+'" beserta semua tasknya?')) return;
  const backupProjects = [...state.projects];
  const backupTasks = [...state.tasks];
  state.projects = state.projects.filter(p => p !== name);
  state.tasks = state.tasks.filter(t => t.project !== name);
  render();

  setSyncing(true);
  const { error } = await sb.from('projects').delete().eq('name', name);
  if(error){ showBanner(error.message, 'error'); state.projects = backupProjects; state.tasks = backupTasks; render(); }
  setSyncing(false);
}

async function submitNewTask(project, inputEl, fileInputEl){
  const text = inputEl ? inputEl.value.trim() : '';
  const wrap = inputEl.closest('.add-task-wrap');
  const pending = wrap._pendingImages || [];
  let imageData = null;
  let caption = text;

  // Build image data from pending images
  if(pending.length === 1){
    imageData = pending[0];
    if(!text) caption = 'Task dengan gambar';
  } else if(pending.length > 1){
    imageData = JSON.stringify(pending);
    if(!text) caption = `Task dengan ${pending.length} gambar`;
  } else if(!text) {
    return; // no image and no text
  }

  const urgentBtn = wrap.querySelector('.urgent-toggle');
  const urgent = urgentBtn.getAttribute('data-urgent') === '1';

  // Clear inputs
  if(inputEl) inputEl.value = '';
  if(fileInputEl) fileInputEl.value = '';
  urgentBtn.setAttribute('data-urgent','0');
  urgentBtn.classList.remove('on');

  // Clear pending images preview
  wrap._pendingImages = [];
  renderPendingImages(wrap);

  const tempId = 'temp-' + Date.now();
  const nowStr = new Date().toISOString();
  state.tasks.push({ id: tempId, project, task: caption, image_data: imageData, caption: text || '', urgent, dateCreated: nowStr, dateCompleted: '', status: 'Belum' });
  render();

  setSyncing(true);
  const { data, error } = await sb.from('tasks')
    .insert({ project_name: project, task: caption, image_data: imageData, caption: text || '', urgent })
    .select().single();
  if(error){
    showBanner(error.message, 'error');
    state.tasks = state.tasks.filter(t => t.id !== tempId);
    render();
  } else {
    const t = state.tasks.find(t => t.id === tempId);
    if(t) t.id = data.id;
  }
  setSyncing(false);
}

function readFileAsDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function previewImage(input){
  const wrap = input.closest('.add-task-wrap');
  if(input.files && input.files.length){
    Array.from(input.files).forEach(file => addImageFromFile(wrap, file));
    input.value = ''; // clear so same files can be selected again
  }
}

function addImageFromFile(wrap, file){
  if(!file || !file.type.startsWith('image/')) return;
  if(!wrap._pendingImages) wrap._pendingImages = [];
  const reader = new FileReader();
  reader.onload = (e) => {
    wrap._pendingImages.push(e.target.result);
    renderPendingImages(wrap);
  };
  reader.readAsDataURL(file);
}

function removePendingImage(wrap, index){
  if(!wrap._pendingImages) return;
  wrap._pendingImages.splice(index, 1);
  renderPendingImages(wrap);
}

function renderPendingImages(wrap){
  const previewWrap = wrap.querySelector('.img-preview-wrap');
  if(!previewWrap) return;
  if(!wrap._pendingImages || wrap._pendingImages.length === 0){
    previewWrap.style.display = 'none';
    previewWrap.innerHTML = '';
    return;
  }
  previewWrap.innerHTML = wrap._pendingImages.map((src, i) => `
    <div class="img-preview-thumb-wrap">
      <img class="img-preview" src="${escapeAttr(src)}" alt="preview ${i+1}">
      <button class="img-remove-btn" onclick="removePendingImage(this.closest('.add-task-wrap'), ${i})">✕</button>
    </div>
  `).join('');
  previewWrap.style.display = 'flex';
}

function getImageArray(imageData){
  if(!imageData) return [];
  const s = String(imageData).trim();
  if(s.startsWith('[')){
    try { return JSON.parse(s); } catch(e){ return [imageData]; }
  }
  return [imageData];
}

async function completeTask(id){
  const t = state.tasks.find(t => t.id === id);
  if(!t) return;
  const backup = { ...t };
  t.status = 'Selesai';
  t.dateCompleted = new Date().toISOString();
  render();

  setSyncing(true);
  const { error } = await sb.from('tasks').update({ status: 'Selesai', date_completed: t.dateCompleted }).eq('id', id);
  if(error){ showBanner(error.message, 'error'); Object.assign(t, backup); render(); }
  setSyncing(false);
}

async function toggleUrgent(id, urgent){
  const t = state.tasks.find(t => t.id === id);
  if(!t) return;
  const backup = t.urgent;
  t.urgent = urgent;
  render();

  setSyncing(true);
  const { error } = await sb.from('tasks').update({ urgent }).eq('id', id);
  if(error){ showBanner(error.message, 'error'); t.urgent = backup; render(); }
  setSyncing(false);
}

function renderHistory(){
  const wrap = document.getElementById('history-list');
  const done = state.tasks.filter(t => t.status === 'Selesai')
    .sort((a,b)=> new Date(b.dateCompleted) - new Date(a.dateCompleted));
  if(done.length === 0){
    wrap.innerHTML = '<div class="empty-msg">Belum ada task selesai.</div>';
    return;
  }
  wrap.innerHTML = done.map(t => {
    let contentHtml = '';
    const imgs = getImageArray(t.image_data);
    if(imgs.length){
      contentHtml += '<div class="task-images">';
      imgs.forEach(src => { contentHtml += `<img src="${escapeAttr(src)}" class="task-img" alt="task image">`; });
      contentHtml += '</div>';
    }
    if(t.caption){
      contentHtml += `<div>${escapeHtml(t.caption)}</div>`;
    } else if(!imgs.length) {
      contentHtml += escapeHtml(t.task);
    }
    return `
    <div class="hist-row">
      <div><span class="proj">${escapeHtml(t.project)}</span><br>${contentHtml}</div>
      <div class="date">selesai ${formatDate(t.dateCompleted)}</div>
    </div>
  `}).join('');
}

function toggleHistory(){
  const el = document.getElementById('history-wrap');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function formatDate(d){
  if(!d) return '-';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){
  return String(str).replace(/'/g, "\\'");
}

// ---- Image zoom modal ----
function openImgModal(src){
  document.getElementById('img-modal-img').src = src;
  document.getElementById('img-modal').classList.add('show');

// Click task image to zoom
document.addEventListener('click', function(e){

// ========== Whiteboard ==========
let wbObjects = [];
let wbTool = 'pencil';
let wbColor = '#D6431F';
let wbWidth = 3;
let wbIsDrawing = false;
let wbCurrentPath = [];
let wbStartPoint = null;
let wbSelectedIdx = -1;
let wbDragOffset = null;
let wbResizeHandle = null;
let wbBackground = null; // base64 data-URL or null
let wbCanvas, wbCtx;
let wbTextInput = null;

function openWhiteboard(){
  const ov = document.getElementById('wb-overlay');
  if(!ov) return;
  wbCanvas = document.getElementById('wb-canvas');
  wbCtx = wbCanvas.getContext('2d');
  // populate projects
  const sel = document.getElementById('wb-project');
  sel.innerHTML = '<option value="">— Pilih Project —</option>';
  (state.projects||[]).forEach(p => {
    sel.innerHTML += `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`;
  });
  resizeCanvas();
  wbObjects = [];
  wbBackground = null;
  wbRedraw();
  ov.classList.add('show');
  document.getElementById('wb-dropzone').classList.remove('hidden');
  // attach canvas events
  if(!wbListenersAttached){
    wbCanvas.addEventListener('mousedown', wbMouseDown);
    wbCanvas.addEventListener('mousemove', wbMouseMove);
    wbCanvas.addEventListener('mouseup', wbMouseUp);
    wbCanvas.addEventListener('mouseleave', wbMouseUp);
    wbCanvas.addEventListener('dblclick', wbDblClick);
    wbListenersAttached = true;
  }
  setTimeout(() => wbCanvas.focus(), 100);
  // paste & drag listeners for canvas
  wbCanvas.addEventListener('paste', wbPasteHandler);
  wbCanvas.addEventListener('dragover', e => e.preventDefault());
  wbCanvas.addEventListener('drop', wbDropHandler);
}
function closeWhiteboard(){
  document.getElementById('wb-overlay').classList.remove('show');
  wbBackground = null;
  wbObjects = [];
  wbTextInput = null;
}
window.addEventListener('resize', () => {
  if(document.getElementById('wb-overlay').classList.contains('show')) resizeCanvas();
});
function resizeCanvas(){
  const parent = wbCanvas.parentElement;
  const w = parent.clientWidth, h = parent.clientHeight;
  if(w > 0 && h > 0){ wbCanvas.width = w; wbCanvas.height = h; wbRedraw(); }
  else{ setTimeout(resizeCanvas, 50); }
}

// ---- tools ----
function wbSetTool(t){
  wbTool = t;
  document.querySelectorAll('.wb-tool').forEach(b => b.classList.remove('active'));
  document.querySelector(`.wb-tool[data-tool="${t}"]`)?.classList.add('active');
  wbCanvas.style.cursor = t === 'select' ? 'default' : 'crosshair';
  wbSelectedIdx = -1; wbRedraw();
}

// ---- drawing (attached in openWhiteboard) ----
var wbListenersAttached = false;

function getCanvasPos(e){
  const r = wbCanvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function wbMouseDown(e){
  const p = getCanvasPos(e);
  if(wbTool === 'text'){
    wbPlaceText(p);
    return;
  }
  if(wbTool === 'eraser'){
    const idx = hitTest(p);
    if(idx >= 0){ wbObjects.splice(idx,1); wbRedraw(); }
    return;
  }
  if(wbTool === 'select'){
    const idx = hitTest(p);
    if(idx >= 0){
      wbSelectedIdx = idx;
      const obj = wbObjects[idx];
      const b = getBounds(obj);
      // Check resize handles
      const hs = getHandles(b);
      for(let key in hs){
        if(dist(p, hs[key]) < 10){ wbResizeHandle = key; wbDragOffset = p; return; }
      }
      wbDragOffset = { x: p.x - (obj.type === 'text' ? obj.x : obj.points?.[0]?.x || obj.x),
                       y: p.y - (obj.type === 'text' ? obj.y : obj.points?.[0]?.y || obj.y) };
      wbRedraw();
      return;
    }
    wbSelectedIdx = -1; wbRedraw();
    return;
  }
  // drawing tool
  wbIsDrawing = true;
  wbSelectedIdx = -1;
  if(wbTool === 'pencil'){
    wbCurrentPath = [p];
  } else {
    wbStartPoint = p;
  }
}

function wbMouseMove(e){
  const p = getCanvasPos(e);
  if(wbTool === 'select' && wbSelectedIdx >= 0 && wbDragOffset){
    const obj = wbObjects[wbSelectedIdx];
    if(wbResizeHandle){
      const b = getBounds(obj);
      const hs = getHandles(b);
      const hp = hs[wbResizeHandle];
      const dx = p.x - wbDragOffset.x;
      const dy = p.y - wbDragOffset.y;
      wbDragOffset = p;
      // scale based on handle type
      const keys = wbResizeHandle.split('_');
      if(keys.length === 2){
        const sx = keys[1] === 'e' ? 1 : keys[1] === 'w' ? -1 : 0;
        const sy = keys[0] === 's' ? 1 : keys[0] === 'n' ? -1 : 0;
        if(obj.type === 'rect' || obj.type === 'circle' || obj.type === 'arrow' || obj.type === 'line'){
          if(obj.points && obj.points.length >= 2){
            if(sx !== 0){
              if(sx > 0) obj.points[1].x = Math.max(obj.points[0].x, obj.points[1].x + dx);
              else obj.points[0].x = Math.min(obj.points[0].x, obj.points[0].x + dx);
            }
            if(sy !== 0){
              if(sy > 0) obj.points[1].y = Math.max(obj.points[0].y, obj.points[1].y + dy);
              else obj.points[0].y = Math.min(obj.points[0].y, obj.points[0].y + dy);
            }
          }
        }
      }
      wbRedraw();
      return;
    }
    // Move
    const dx = p.x - wbDragOffset.x;
    const dy = p.y - wbDragOffset.y;
    if(obj.type === 'text'){ obj.x += dx; obj.y += dy; }
    else if(obj.points){
      obj.points.forEach(pt => { pt.x += dx; pt.y += dy; });
    }
    wbDragOffset = p;
    wbRedraw();
    return;
  }
  if(!wbIsDrawing) return;
  if(wbTool === 'pencil'){
    wbCurrentPath.push(p);
    wbRedraw();
    // draw temporary path
    wbCtx.save();
    wbCtx.strokeStyle = wbColor;
    wbCtx.lineWidth = wbWidth;
    wbCtx.lineCap = 'round';
    wbCtx.lineJoin = 'round';
    wbCtx.beginPath();
    wbCurrentPath.forEach((pt, i) => i===0 ? wbCtx.moveTo(pt.x,pt.y) : wbCtx.lineTo(pt.x,pt.y));
    wbCtx.stroke();
    wbCtx.restore();
  } else {
    wbRedraw();
    // draw preview shape
    wbCtx.save();
    wbCtx.strokeStyle = wbColor;
    wbCtx.lineWidth = wbWidth;
    wbCtx.lineCap = 'round';
    const x1 = wbStartPoint.x, y1 = wbStartPoint.y, x2 = p.x, y2 = p.y;
    wbCtx.globalAlpha = 0.5;
    if(wbTool === 'line' || wbTool === 'arrow'){
      wbCtx.beginPath(); wbCtx.moveTo(x1,y1); wbCtx.lineTo(x2,y2); wbCtx.stroke();
      if(wbTool === 'arrow'){
        const a = Math.atan2(y2-y1, x2-x1);
        wbCtx.beginPath();
        wbCtx.moveTo(x2,y2);
        wbCtx.lineTo(x2-12*Math.cos(a-0.4), y2-12*Math.sin(a-0.4));
        wbCtx.lineTo(x2-12*Math.cos(a+0.4), y2-12*Math.sin(a+0.4));
        wbCtx.closePath(); wbCtx.fillStyle = wbColor; wbCtx.fill();
      }
    } else if(wbTool === 'rect'){
      wbCtx.strokeRect(Math.min(x1,x2), Math.min(y1,y2), Math.abs(x2-x1), Math.abs(y2-y1));
    } else if(wbTool === 'circle'){
      const cx = (x1+x2)/2, cy = (y1+y2)/2, rx = Math.abs(x2-x1)/2, ry = Math.abs(y2-y1)/2;
      wbCtx.beginPath(); wbCtx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); wbCtx.stroke();
    }
    wbCtx.restore();
  }
}

function wbMouseUp(e){
  if(!wbIsDrawing && wbResizeHandle){ wbResizeHandle = null; wbDragOffset = null; return; }
  if(wbResizeHandle){ wbResizeHandle = null; wbDragOffset = null; wbRedraw(); return; }
  if(!wbIsDrawing){ wbDragOffset = null; return; }
  wbIsDrawing = false;
  const p = getCanvasPos(e);
  if(wbTool === 'pencil'){
    if(wbCurrentPath.length < 2) return;
    wbObjects.push({ type:'pencil', points:[...wbCurrentPath], color:wbColor, width:wbWidth });
    wbCurrentPath = [];
    wbRedraw();
  } else {
    if(!wbStartPoint) return;
    const x1 = wbStartPoint.x, y1 = wbStartPoint.y, x2 = p.x, y2 = p.y;
    const dx = x2 - x1, dy = y2 - y1;
    if(Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
    let obj = { color:wbColor, width:wbWidth };
    if(wbTool === 'line' || wbTool === 'arrow'){
      obj.type = wbTool;
      obj.points = [{x:x1,y:y1},{x:x2,y:y2}];
    } else if(wbTool === 'rect'){
      obj.type = 'rect';
      obj.points = [{x:x1,y:y1},{x:x2,y:y2}];
    } else if(wbTool === 'circle'){
      obj.type = 'circle';
      obj.points = [{x:x1,y:y1},{x:x2,y:y2}];
    }
    wbObjects.push(obj);
    wbStartPoint = null;
    wbRedraw();
  }
}

function wbDblClick(e){
  if(wbTool === 'text'){
    const p = getCanvasPos(e);
    wbPlaceText(p);
  }
}

function wbPlaceText(p){
  const txt = prompt('Teks:');
  if(txt && txt.trim()){
    wbObjects.push({ type:'text', x:p.x, y:p.y, text:txt.trim(), color:wbColor, width:wbWidth });
    wbRedraw();
  }
}

function hitTest(p){
  for(let i = wbObjects.length-1; i >= 0; i--){
    const obj = wbObjects[i];
    const b = getBounds(obj);
    if(p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) return i;
  }
  return -1;
}

function getBounds(obj){
  if(obj.type === 'text'){
    wbCtx.font = `${Math.max(14, obj.width*5)}px 'Inter',sans-serif`;
    const m = wbCtx.measureText(obj.text);
    return { x: obj.x - 2, y: obj.y - obj.width*5, w: m.width + 4, h: obj.width*5 + 6 };
  }
  if(!obj.points || obj.points.length === 0) return {x:0,y:0,w:0,h:0};
  let xs = obj.points.map(p=>p.x), ys = obj.points.map(p=>p.y);
  const minx = Math.min(...xs), maxx = Math.max(...xs);
  const miny = Math.min(...ys), maxy = Math.max(...ys);
  return { x: minx - 6, y: miny - 6, w: maxx - minx + 12, h: maxy - miny + 12 };
}

function getHandles(b){
  return {
    'n_w': {x:b.x, y:b.y}, 'n_e': {x:b.x+b.w, y:b.y},
    's_w': {x:b.x, y:b.y+b.h}, 's_e': {x:b.x+b.w, y:b.y+b.h}
  };
}

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

// ---- paste image (attached in openWhiteboard) ----
function wbPasteHandler(e){
  e.preventDefault();
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for(let item of items){
    if(item.type.indexOf('image') !== -1){
      const blob = item.getAsFile();
      if(blob){
        const reader = new FileReader();
        reader.onload = (ev) => {
          wbBackground = ev.target.result;
          document.getElementById('wb-dropzone').classList.add('hidden');
          wbRedraw();
        };
        reader.readAsDataURL(blob);
      }
      return;
    }
  }
}
function wbDropHandler(e){
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')){
    const reader = new FileReader();
    reader.onload = (ev) => {
      wbBackground = ev.target.result;
      document.getElementById('wb-dropzone').classList.add('hidden');
      wbRedraw();
    };
    reader.readAsDataURL(file);
  }
}

// ---- redraw ----
function wbRedraw(){
  if(!wbCtx) return;
  wbCtx.clearRect(0,0,wbCanvas.width,wbCanvas.height);
  // background image
  if(wbBackground){
    const img = new Image();
    img.onload = () => {
      wbCtx.drawImage(img,0,0,wbCanvas.width,wbCanvas.height);
      drawObjects();
    };
    img.src = wbBackground;
  } else {
    drawObjects();
  }
}
function drawObjects(){
  wbObjects.forEach((obj, i) => {
    wbCtx.save();
    wbCtx.strokeStyle = obj.color || '#000';
    wbCtx.fillStyle = obj.color || '#000';
    wbCtx.lineWidth = obj.width || 2;
    wbCtx.lineCap = 'round';
    wbCtx.lineJoin = 'round';
    if(obj.type === 'pencil' && obj.points.length >= 2){
      wbCtx.beginPath();
      obj.points.forEach((pt, j) => j===0 ? wbCtx.moveTo(pt.x,pt.y) : wbCtx.lineTo(pt.x,pt.y));
      wbCtx.stroke();
    } else if(obj.type === 'rect' && obj.points.length >= 2){
      const x1=obj.points[0].x, y1=obj.points[0].y, x2=obj.points[1].x, y2=obj.points[1].y;
      wbCtx.strokeRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));
    } else if(obj.type === 'circle' && obj.points.length >= 2){
      const x1=obj.points[0].x, y1=obj.points[0].y, x2=obj.points[1].x, y2=obj.points[1].y;
      wbCtx.beginPath();
      wbCtx.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2,Math.abs(y2-y1)/2,0,0,Math.PI*2);
      wbCtx.stroke();
    } else if((obj.type === 'line' || obj.type === 'arrow') && obj.points.length >= 2){
      const a=obj.points[0], b=obj.points[1];
      wbCtx.beginPath(); wbCtx.moveTo(a.x,a.y); wbCtx.lineTo(b.x,b.y); wbCtx.stroke();
      if(obj.type === 'arrow'){
        const ang = Math.atan2(b.y-a.y, b.x-a.x);
        wbCtx.beginPath();
        wbCtx.moveTo(b.x,b.y);
        wbCtx.lineTo(b.x-12*Math.cos(ang-0.4), b.y-12*Math.sin(ang-0.4));
        wbCtx.lineTo(b.x-12*Math.cos(ang+0.4), b.y-12*Math.sin(ang+0.4));
        wbCtx.closePath(); wbCtx.fill();
      }
    } else if(obj.type === 'text'){
      wbCtx.font = `${Math.max(14, (obj.width||2)*5)}px 'Inter',sans-serif`;
      wbCtx.fillText(obj.text, obj.x, obj.y);
    }
    // selection highlight
    if(i === wbSelectedIdx){
      const b = getBounds(obj);
      wbCtx.strokeStyle = '#2563EB'; wbCtx.lineWidth = 1.5; wbCtx.setLineDash([4,4]);
      wbCtx.strokeRect(b.x, b.y, b.w, b.h);
      wbCtx.setLineDash([]);
      // handles
      const hs = getHandles(b);
      for(let key in hs){
        const hp = hs[key];
        wbCtx.fillStyle = '#fff'; wbCtx.strokeStyle = '#2563EB'; wbCtx.lineWidth = 1.5;
        wbCtx.fillRect(hp.x-4, hp.y-4, 8, 8);
        wbCtx.strokeRect(hp.x-4, hp.y-4, 8, 8);
      }
    }
    wbCtx.restore();
  });
}

// ---- undo ----
function wbUndo(){
  if(wbObjects.length === 0){
    if(wbBackground){ wbBackground = null; wbRedraw(); document.getElementById('wb-dropzone').classList.remove('hidden'); }
    return;
  }
  wbObjects.pop();
  wbSelectedIdx = -1;
  wbRedraw();
}

// ---- clear ----
function wbClearCanvas(){
  if(!confirm('Hapus semua anotasi dan gambar?')) return;
  wbObjects = [];
  wbBackground = null;
  wbSelectedIdx = -1;
  wbRedraw();
  document.getElementById('wb-dropzone').classList.remove('hidden');
}

// ---- add to task ----
async function wbAddToTask(){
  const project = document.getElementById('wb-project').value;
  if(!project){ alert('Pilih project terlebih dahulu.'); return; }
  const caption = document.getElementById('wb-caption').value.trim() || 'Revisi dari whiteboard';
  const urgent = document.getElementById('wb-urgent').checked;

  // Capture canvas as image, first ensure background is drawn
  // Create an offscreen canvas at fixed resolution to capture properly
  const bgImg = wbBackground ? await loadImage(wbBackground) : null;
  const capCanvas = document.createElement('canvas');
  capCanvas.width = wbCanvas.width;
  capCanvas.height = wbCanvas.height;
  const capCtx = capCanvas.getContext('2d');
  if(bgImg) capCtx.drawImage(bgImg, 0, 0, capCanvas.width, capCanvas.height);
  // Draw objects on capture canvas
  wbObjects.forEach(obj => {
    capCtx.save();
    capCtx.strokeStyle = obj.color || '#000';
    capCtx.fillStyle = obj.color || '#000';
    capCtx.lineWidth = (obj.width || 2) * (capCanvas.width / wbCanvas.width);
    capCtx.lineCap = 'round';
    capCtx.lineJoin = 'round';
    if(obj.type === 'pencil' && obj.points.length >= 2){
      capCtx.beginPath();
      obj.points.forEach((pt, j) => {
        const sx = pt.x / wbCanvas.width * capCanvas.width;
        const sy = pt.y / wbCanvas.height * capCanvas.height;
        j===0 ? capCtx.moveTo(sx,sy) : capCtx.lineTo(sx,sy);
      });
      capCtx.stroke();
    } else if(obj.type === 'rect' && obj.points.length >= 2){
      const x1=obj.points[0].x/wbCanvas.width*capCanvas.width, y1=obj.points[0].y/wbCanvas.height*capCanvas.height;
      const x2=obj.points[1].x/wbCanvas.width*capCanvas.width, y2=obj.points[1].y/wbCanvas.height*capCanvas.height;
      capCtx.strokeRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));
    } else if(obj.type === 'circle' && obj.points.length >= 2){
      const x1=obj.points[0].x/wbCanvas.width*capCanvas.width, y1=obj.points[0].y/wbCanvas.height*capCanvas.height;
      const x2=obj.points[1].x/wbCanvas.width*capCanvas.width, y2=obj.points[1].y/wbCanvas.height*capCanvas.height;
      capCtx.beginPath();
      capCtx.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2,Math.abs(y2-y1)/2,0,0,Math.PI*2);
      capCtx.stroke();
    } else if((obj.type === 'line' || obj.type === 'arrow') && obj.points.length >= 2){
      const a={x:obj.points[0].x/wbCanvas.width*capCanvas.width, y:obj.points[0].y/wbCanvas.height*capCanvas.height};
      const b={x:obj.points[1].x/wbCanvas.width*capCanvas.width, y:obj.points[1].y/wbCanvas.height*capCanvas.height};
      capCtx.beginPath(); capCtx.moveTo(a.x,a.y); capCtx.lineTo(b.x,b.y); capCtx.stroke();
      if(obj.type === 'arrow'){
        const ang = Math.atan2(b.y-a.y, b.x-a.x);
        capCtx.beginPath();
        capCtx.moveTo(b.x,b.y);
        capCtx.lineTo(b.x-12*Math.cos(ang-0.4), b.y-12*Math.sin(ang-0.4));
        capCtx.lineTo(b.x-12*Math.cos(ang+0.4), b.y-12*Math.sin(ang+0.4));
        capCtx.closePath(); capCtx.fill();
      }
    } else if(obj.type === 'text'){
      const fs = Math.max(14, (obj.width||2)*5) * (capCanvas.width / wbCanvas.width);
      capCtx.font = `${Math.round(fs)}px 'Inter',sans-serif`;
      capCtx.fillText(obj.text, obj.x/wbCanvas.width*capCanvas.width, obj.y/wbCanvas.height*capCanvas.height);
    }
    capCtx.restore();
  });
  const imageData = capCanvas.toDataURL('image/png');

  // Insert task
  const tempId = 'temp-' + Date.now();
  const nowStr = new Date().toISOString();
  const pendingImageCount = 1;
  const captionText = caption || `Revisi dari whiteboard`;
  state.tasks.push({
    id: tempId, project, task: captionText, image_data: imageData,
    caption: captionText || '', urgent: !!urgent,
    dateCreated: nowStr, dateCompleted: '', status: 'Belum'
  });
  render();
  setSyncing(true);
  const { data, error } = await sb.from('tasks')
    .insert({ project_name: project, task: captionText, image_data: imageData, caption: captionText || '', urgent: !!urgent })
    .select().single();
  if(error){
    showBanner(error.message, 'error');
    state.tasks = state.tasks.filter(t => t.id !== tempId);
    render();
  } else {
    const t = state.tasks.find(t => t.id === tempId);
    if(t) t.id = data.id;
  }
  setSyncing(false);
  closeWhiteboard();
}
function loadImage(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

// Keyboard shortcut: Ctrl+Shift+W to open whiteboard
document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.shiftKey && (e.key === 'W' || e.key === 'w')){
    e.preventDefault();
    if(document.getElementById('wb-overlay').classList.contains('show')) closeWhiteboard();
    else openWhiteboard();
  }
});

// ---- Realtime sync across devices ----
sb.channel('public:tasks-projects')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadData())
  .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, () => loadData())
  .subscribe();

loadData();
</script>
